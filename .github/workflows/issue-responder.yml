name: AI Issue Responder

on:
  issues:
    types: [opened]

permissions:
  issues: write

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  respond:
    runs-on: ubuntu-latest
    if: github.event.issue.user.type != 'Bot'
    steps:
      - name: Generate AI response
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          REPO="${{ github.repository }}"

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" -R "$REPO" --json title -q .title)
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" -R "$REPO" --json body -q .body)

          cat > /tmp/system.txt << 'SYSPROMPT'
          You are a maintainer of endpulse, an open-source Python CLI for multi-endpoint API health checks.

          Key features: async concurrent checks, response assertions (body/header/status), SSL cert monitoring, watch mode, YAML config, output formats (table/json/markdown/csv), webhook alerts (Slack/Discord), CI/CD integration (--fail flag), GitHub Actions composite action.

          Install: pip install endpulse
          Repo: kimhinton/endpulse

          Task — classify and respond to this GitHub issue:
          1. Classify as exactly one of: bug, enhancement, question, documentation
          2. Write a helpful, concise English response (under 250 words)

          Rules:
          - Bug: ask for Python version, OS, endpulse version, and repro steps if missing. Suggest workarounds if obvious.
          - Enhancement: acknowledge, discuss feasibility and fit with existing architecture.
          - Question: answer directly with CLI flag examples or config snippets.
          - Documentation: acknowledge the gap, point to existing docs if relevant.
          - Reference actual endpulse features, flags, and config options — never invent ones that don't exist.

          Output format (strict):
          LABEL: <bug|enhancement|question|documentation>
          ---
          <your response in GitHub-flavored markdown>
          SYSPROMPT

          PAYLOAD=$(jq -n \
            --rawfile sys /tmp/system.txt \
            --arg title "$ISSUE_TITLE" \
            --arg body "${ISSUE_BODY:0:8000}" \
            '{
              systemInstruction: { parts: [{ text: $sys }] },
              contents: [{ parts: [{ text: ("Issue: " + $title + "\n\n" + $body) }] }]
            }')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Gemini API returned HTTP $HTTP_CODE"
            echo "$BODY" | jq -r '.error.message // .' | head -3
            exit 1
          fi

          AI_TEXT=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$AI_TEXT" ]; then
            echo "::error::Empty response from Gemini"
            exit 1
          fi

          LABEL=$(echo "$AI_TEXT" | head -1 | sed 's/^LABEL:[[:space:]]*//' | tr '[:upper:]' '[:lower:]' | xargs)
          COMMENT=$(echo "$AI_TEXT" | sed '1,/^---$/d')

          {
            echo "$COMMENT"
            echo ""
            echo "---"
            echo "<sub>Generated by AI — a maintainer will follow up if needed.</sub>"
          } > /tmp/comment.md

          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Add label
        if: always() && steps.ai.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ steps.ai.outputs.label }}"
          if [[ "$LABEL" =~ ^(bug|enhancement|question|documentation)$ ]]; then
            gh issue edit ${{ github.event.issue.number }} \
              -R "${{ github.repository }}" \
              --add-label "$LABEL" 2>/dev/null || true
          fi

      - name: Post comment
        if: always() && steps.ai.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            -R "${{ github.repository }}" \
            --body-file /tmp/comment.md
