name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type != 'Bot' && !github.event.pull_request.draft
    steps:
      - name: Generate AI review
        id: ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO="${{ github.repository }}"

          PR_TITLE=$(gh pr view "$PR_NUMBER" -R "$REPO" --json title -q .title)
          PR_BODY=$(gh pr view "$PR_NUMBER" -R "$REPO" --json body -q .body)
          CHANGED_FILES=$(gh pr view "$PR_NUMBER" -R "$REPO" --json files -q '.files[].path' | head -50)
          DIFF=$(gh pr diff "$PR_NUMBER" -R "$REPO" | head -c 60000)

          if [ -z "$DIFF" ]; then
            echo "Empty diff — skipping review"
            exit 0
          fi

          cat > /tmp/system.txt << 'SYSPROMPT'
          You are a code reviewer for endpulse, an open-source Python CLI for API health checking.

          Tech stack: Python 3.9+, asyncio/aiohttp, Click CLI, Rich tables, PyYAML config.
          Quality: ruff (lint), mypy (types), pytest + pytest-cov (tests), cross-platform CI (Linux/macOS/Windows).
          Architecture: cli.py (Click entrypoint) → config.py (YAML parsing) → checker.py (async HTTP) → reporter.py (output formatting) → notifier.py (webhooks) → ssl_checker.py (cert checks).

          Review the PR diff and provide:
          1. Summary — what this PR does (2-3 sentences)
          2. Review — focus only on substantive issues:
             - Bugs, logic errors, race conditions in async code
             - Security: URL handling, SSL verification, command injection via config
             - Missing error handling for network/filesystem operations
             - Type safety gaps that mypy wouldn't catch
             - Missing test coverage for new code paths
             - Breaking changes to CLI interface or config schema
          3. Verdict — one of: LGTM, minor suggestions, needs changes

          Rules:
          - Skip style/formatting — ruff handles that
          - Don't flag missing docstrings or comments
          - Be constructive and specific — quote the relevant code
          - If the PR is clean, say LGTM and keep it short
          - Under 400 words total

          Format:
          ## Summary
          <summary>

          ## Review
          <findings, each as a bullet>

          **Verdict**: <LGTM | Minor suggestions | Needs changes>
          SYSPROMPT

          PAYLOAD=$(jq -n \
            --rawfile sys /tmp/system.txt \
            --arg title "$PR_TITLE" \
            --arg body "${PR_BODY:0:2000}" \
            --arg files "$CHANGED_FILES" \
            --arg diff "$DIFF" \
            '{
              systemInstruction: { parts: [{ text: $sys }] },
              contents: [{ parts: [{ text: ("PR: " + $title + "\n\nDescription:\n" + $body + "\n\nChanged files:\n" + $files + "\n\nDiff:\n```diff\n" + $diff + "\n```") }] }]
            }')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Gemini API returned HTTP $HTTP_CODE"
            echo "$BODY" | jq -r '.error.message // .' | head -3
            exit 1
          fi

          AI_TEXT=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$AI_TEXT" ]; then
            echo "::error::Empty response from Gemini"
            exit 1
          fi

          {
            echo "$AI_TEXT"
            echo ""
            echo "---"
            echo "<sub>Generated by AI — not a substitute for human review.</sub>"
          } > /tmp/review.md

      - name: Post review
        if: always() && steps.ai.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            -R "${{ github.repository }}" \
            --body-file /tmp/review.md
