name: Bug report
description: Report a bug or unexpected behavior in endpulse
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the fields below so we can reproduce and fix quickly.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact `endpulse` command you ran (or the YAML config) and what you saw.
      placeholder: |
        1. pip install endpulse==0.3.0
        2. endpulse https://example.com --ssl -a "body_contains:ok"
        3. Observed: ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: endpulse version
      description: Run `endpulse --version`
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Docker / containerized
        - CI runner (GitHub Actions / GitLab CI / other)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or stack trace
      description: Paste terminal output, stack traces, or JSON/CSV output that shows the problem.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
        - label: I verified this reproduces on the latest `0.3.x` release.
          required: true
